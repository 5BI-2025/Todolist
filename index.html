<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kanban Board - Todo List</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca'
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body class="bg-gradient-to-br from-[#f3fbf7] via-[#eef8ff] to-[#f7fbf9] min-h-screen flex flex-col items-center p-4">

  <div class="w-full max-w-7xl flex flex-col sm:flex-row items-center justify-between mb-6 px-2">
    <div class="flex items-center mb-4 sm:mb-0">
      <span class="text-indigo-600 text-4xl mr-3"><i class="fas fa-clipboard-list"></i></span>
      <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-500">Kanban Board - Todo List</h1>
    </div>
    <button id="toggle-new-issue" class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg hover:bg-indigo-700 hover:shadow-lg transition-all duration-200 flex items-center gap-2">
      <i class="fas fa-plus"></i> Nuova Issue
    </button>
  </div>

  <!-- Filtri e Ricerca (ora sopra il form) -->
  <div class="bg-white p-5 rounded-xl shadow-lg border border-gray-100 w-full max-w-7xl mb-6 transition-all hover:shadow-xl duration-300">
    <div class="flex flex-col md:flex-row gap-5 justify-between">
      <div class="flex-1">
        <label for="search" class="block font-medium mb-2 text-gray-700">Cerca Issue</label>
        <div class="relative">
          <input type="text" id="search" placeholder="Cerca per titolo o descrizione..." 
                 class="w-full border border-gray-200 rounded-lg px-4 py-2.5 pl-10 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
          <i class="fas fa-search absolute left-3.5 top-3.5 text-gray-400"></i>
        </div>
      </div>
      <div class="md:w-64">
        <label for="filter-priority" class="block font-medium mb-2 text-gray-700">Filtra per Priorità</label>
        <div class="relative">
          <select id="filter-priority" class="w-full appearance-none border border-gray-200 rounded-lg px-4 py-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white transition-all">
            <option value="all">Tutte</option>
            <option value="low">Bassa</option>
            <option value="medium">Media</option>
            <option value="high">Alta</option>
            <option value="critical">Critica</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
            <i class="fas fa-chevron-down"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Nuova Issue (form inside modal, hidden by default) -->
  <div id="modal-new-issue" class="fixed inset-0 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none">
    <div id="modal-overlay" class="absolute inset-0 bg-black opacity-60 transition-opacity duration-300" style="z-index:50"></div>

  <div id="modal-content" class="relative bg-white rounded-xl shadow-2xl w-full max-w-xl p-7 transform transition-all duration-300 scale-95 opacity-0" style="z-index:60">
      <button id="modal-close" aria-label="Chiudi" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
        <i class="fas fa-times text-lg"></i>
      </button>

      <!-- Form Nuova Issue -->
      <form id="new-issue-form">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
          <i class="fas fa-plus-circle text-indigo-600 mr-3"></i> Nuova Issue
        </h2>
        <div class="mb-5">
          <label for="title" class="block font-medium mb-2 text-gray-700">Titolo <span class="text-red-500">*</span></label>
          <input type="text" id="title" name="title" required 
                 class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm" />
        </div>
        <div class="mb-5">
          <label for="description" class="block font-medium mb-2 text-gray-700">Descrizione</label>
          <textarea id="description" name="description" rows="3" 
                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"></textarea>
        </div>
        <div class="mb-6">
          <label for="priority" class="block font-medium mb-2 text-gray-700">Priorità</label>
          <div class="relative">
            <select id="priority" name="priority" 
                  class="w-full appearance-none border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm">
              <option value="low">Bassa</option>
              <option value="medium" selected>Media</option>
              <option value="high">Alta</option>
              <option value="critical">Critica</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
              <i class="fas fa-chevron-down"></i>
            </div>
          </div>
        </div>
        <div class="flex gap-3 justify-end">
          <button type="button" id="modal-cancel" class="px-5 py-2.5 rounded-lg border border-gray-300 hover:bg-gray-100 font-medium transition-colors">Annulla</button>
          <button type="submit" class="bg-gradient-to-r from-indigo-600 to-purple-500 text-white px-5 py-2.5 rounded-lg hover:shadow-lg transition-all flex items-center gap-2 font-medium focus:outline-none focus:ring-4 focus:ring-indigo-200" style="position:relative; z-index:60;">
            <i class="fas fa-plus"></i> Aggiungi Issue
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Kanban Board - Versione Compatta -->
<div id="kanban" class="flex flex-col md:flex-row gap-5 w-full max-w-7xl overflow-x-auto pb-4">

  <!-- Colonne -->
  <div class="bg-white rounded-xl shadow-md p-5 flex flex-col min-w-[300px] kanban-column border-t-4 border-gray-400 hover:shadow-lg transition-shadow duration-200" data-state="backlog">
    <div class="flex justify-between items-center mb-5">
      <h3 class="font-bold text-lg text-gray-700 flex items-center">
        <i class="fas fa-list mr-2 text-gray-500"></i> Backlog
      </h3>
      <span id="backlog-count" class="bg-gray-200 text-gray-700 rounded-full px-3 py-1 text-xs font-semibold">0</span>
    </div>
    <div id="backlog" class="flex-1 flex flex-col gap-4 overflow-y-auto min-h-[300px] max-h-[60vh]"></div>
  </div>

  <div class="bg-white rounded-xl shadow-md p-5 flex flex-col min-w-[300px] kanban-column border-t-4 border-blue-400 hover:shadow-lg transition-shadow duration-200" data-state="inprogress">
    <div class="flex justify-between items-center mb-5">
      <h3 class="font-bold text-lg text-gray-700 flex items-center">
          <i class="fas fa-tasks mr-2 text-blue-500"></i> In Progress
      </h3>
      <span id="inprogress-count" class="bg-blue-100 text-blue-700 rounded-full px-3 py-1 text-xs font-semibold">0</span>
    </div>
    <div id="inprogress" class="flex-1 flex flex-col gap-4 overflow-y-auto min-h-[300px] max-h-[60vh]"></div>
  </div>

  <div class="bg-white rounded-xl shadow-md p-5 flex flex-col min-w-[300px] kanban-column border-t-4 border-yellow-400 hover:shadow-lg transition-shadow duration-200" data-state="review">
    <div class="flex justify-between items-center mb-5">
      <h3 class="font-bold text-lg text-gray-700 flex items-center">
        <i class="fas fa-search mr-2 text-yellow-500"></i> Review
      </h3>
      <span id="review-count" class="bg-yellow-100 text-yellow-700 rounded-full px-3 py-1 text-xs font-semibold">0</span>
    </div>
    <div id="review" class="flex-1 flex flex-col gap-4 overflow-y-auto min-h-[300px] max-h-[60vh]"></div>
  </div>

  <div class="bg-white rounded-xl shadow-md p-5 flex flex-col min-w-[300px] kanban-column border-t-4 border-green-400 hover:shadow-lg transition-shadow duration-200" data-state="done">
    <div class="flex justify-between items-center mb-5">
      <h3 class="font-bold text-lg text-gray-700 flex items-center">
        <i class="fas fa-check-circle mr-2 text-green-500"></i> Done
      </h3>
      <span id="done-count" class="bg-green-100 text-green-700 rounded-full px-3 py-1 text-xs font-semibold">0</span>
    </div>
    <div id="done" class="flex-1 flex flex-col gap-4 overflow-y-auto min-h-[300px] max-h-[60vh]"></div>
  </div>

</div>

  <script src="src/js/app.js"></script>
</body>
</html>
