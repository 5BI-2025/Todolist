<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kanban Board - Todo List</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="src/css/style.css" />
  </head>
  <body
    class="bg-linear-to-br from-[#f3fbf7] via-[#eef8ff] to-[#f7fbf9] min-h-screen flex flex-col items-center p-4"
  >
    <div
      class="w-full max-w-7xl flex flex-col sm:flex-row items-center justify-between mb-6 px-2"
    >
      <div class="flex items-center mb-4 sm:mb-0">
        <span class="text-indigo-600 text-4xl mr-3"
          ><i class="fas fa-clipboard-list"></i
        ></span>
        <h1
          class="text-3xl font-extrabold bg-clip-text text-transparent bg-linear-to-br from-indigo-600 to-purple-500"
        >
          Task Board - Todo List
        </h1>
      </div>
      <button
        id="toggle-new-issue"
        class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg hover:bg-indigo-700 hover:shadow-lg transition-all duration-200 flex items-center gap-2"
      >
        <i class="fas fa-plus"></i> Nuovo Todo
      </button>
      <button
        id="create-list"
        class="ml-3 bg-white border border-gray-200 text-gray-700 px-4 py-2.5 rounded-lg hover:shadow transition-all duration-200 flex items-center gap-2"
        title="Crea una nuova lista"
      >
        <i class="fas fa-layer-group"></i> Crea Lista
      </button>
    </div>

    <!-- Filtri e Ricerca (ora sopra il form) -->
    <div
      class="bg-white p-5 rounded-xl shadow-lg border border-gray-100 w-full max-w-7xl mb-6 transition-all hover:shadow-xl duration-300"
    >
      <div class="flex flex-col gap-5">
        <!-- View Toggle -->
        <div class="flex justify-center mb-2">
          <div class="inline-flex rounded-md shadow-sm" role="group">
            <button
              id="view-board"
              type="button"
              class="view-btn active px-4 py-2 text-sm font-medium text-indigo-700 bg-indigo-100 border border-indigo-300 rounded-l-lg hover:bg-indigo-200 focus:z-10 focus:ring-2 focus:ring-indigo-500 focus:text-indigo-800"
            >
              <i class="fas fa-columns mr-2"></i>
              Bacheca
            </button>
            <button
              id="view-calendar"
              type="button"
              class="view-btn px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-r-lg hover:bg-gray-100 hover:text-indigo-700 focus:z-10 focus:ring-2 focus:ring-indigo-500"
            >
              <i class="fas fa-calendar-alt mr-2"></i>
              Calendario
            </button>
          </div>
        </div>

        <div class="flex flex-col md:flex-row gap-5 justify-between">
          <div class="flex-1">
            <label for="search" class="block font-medium mb-2 text-gray-700"
              >Cerca Todo</label
            >
            <div class="relative">
              <input
                type="text"
                id="search"
                placeholder="Cerca per titolo o descrizione..."
                class="w-full border border-gray-200 rounded-lg px-4 py-2.5 pl-10 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
              />
              <i
                class="fas fa-search absolute left-3.5 top-3.5 text-gray-400"
              ></i>
            </div>
          </div>
          <div class="md:w-64">
            <label
              for="filter-priority"
              class="block font-medium mb-2 text-gray-700"
              >Filtra per Priorità</label
            >
            <div class="relative">
              <select
                id="filter-priority"
                class="w-full appearance-none border border-gray-200 rounded-lg px-4 py-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white transition-all"
              >
                <option value="all">Tutte</option>
                <option value="low">Bassa</option>
                <option value="medium">Media</option>
                <option value="high">Alta</option>
                <option value="critical">Critica</option>
              </select>
              <div
                class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500"
              >
                <i class="fas fa-chevron-down"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Nuova Issue (form inside modal, hidden by default) -->
    <div
      id="modal-new-issue"
      class="fixed inset-0 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none"
    >
      <div
        id="modal-overlay"
        class="absolute inset-0 bg-black opacity-60 transition-opacity duration-300"
        style="z-index: 50"
      ></div>

      <div
        id="modal-content"
        class="relative bg-white rounded-xl shadow-2xl w-full max-w-xl p-7 transform transition-all duration-300 scale-95 opacity-0"
        style="z-index: 60"
      >
        <button
          id="modal-close"
          aria-label="Chiudi"
          class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors"
        >
          <i class="fas fa-times text-lg"></i>
        </button>

        <!-- Form Nuova Issue -->
        <form id="new-issue-form">
          <h2 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
            <i class="fas fa-plus-circle text-indigo-600 mr-3"></i> Nuovo Todo
          </h2>
          <div class="mb-5">
            <label for="title" class="block font-medium mb-2 text-gray-700"
              >Titolo <span class="text-red-500">*</span></label
            >
            <input
              type="text"
              id="title"
              name="title"
              required
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
            />
          </div>
          <div class="mb-5">
            <label
              for="description"
              class="block font-medium mb-2 text-gray-700"
              >Descrizione</label
            >
            <textarea
              id="description"
              name="description"
              rows="3"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
            ></textarea>
          </div>
          <div class="mb-5">
            <label for="priority" class="block font-medium mb-2 text-gray-700"
              >Priorità</label
            >
            <div class="relative">
              <select
                id="priority"
                name="priority"
                class="w-full appearance-none border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
              >
                <option value="low">Bassa</option>
                <option value="medium" selected>Media</option>
                <option value="high">Alta</option>
                <option value="critical">Critica</option>
              </select>
              <div
                class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500"
              >
                <i class="fas fa-chevron-down"></i>
              </div>
            </div>
          </div>
          <div class="mb-6">
            <label for="dueDate" class="block font-medium mb-2 text-gray-700"
              >Data di scadenza</label
            >
            <div class="relative">
              <input
                type="date"
                id="dueDate"
                name="dueDate"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
              />
              <div
                class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500"
              >
                <i class="far fa-calendar-alt"></i>
              </div>
            </div>
          </div>
          <div class="flex gap-3 justify-end">
            <button
              type="button"
              id="modal-cancel"
              class="px-5 py-2.5 rounded-lg border border-gray-300 hover:bg-gray-100 font-medium transition-colors"
            >
              Annulla
            </button>
            <button
              type="submit"
              class="bg-linear-to-br from-indigo-600 to-purple-500 text-white px-5 py-2.5 rounded-lg hover:shadow-lg transition-all flex items-center gap-2 font-medium focus:outline-none focus:ring-4 focus:ring-indigo-200"
              style="position: relative; z-index: 60"
            >
              <i class="fas fa-plus"></i> Aggiungi Todo
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Task Board - rendered dynamically -->
    <div
      id="board"
      class="flex flex-col md:flex-row gap-5 w-full max-w-7xl overflow-x-auto pb-4"
    ></div>

    <!-- Calendar View - hidden by default -->
    <div id="calendar-view" class="w-full max-w-7xl hidden">
      <div class="bg-white rounded-xl shadow-md p-5">
        <div
          id="calendar-header"
          class="flex justify-between items-center mb-4"
        >
          <button
            id="prev-month"
            class="text-gray-600 hover:text-indigo-600 p-2"
          >
            <i class="fas fa-chevron-left"></i>
          </button>
          <h2 id="current-month" class="text-xl font-bold text-gray-800"></h2>
          <button
            id="next-month"
            class="text-gray-600 hover:text-indigo-600 p-2"
          >
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
        <div
          class="grid grid-cols-7 text-center font-medium text-sm text-gray-600 border-b border-gray-200 pb-2 mb-2"
        >
          <div>Dom</div>
          <div>Lun</div>
          <div>Mar</div>
          <div>Mer</div>
          <div>Gio</div>
          <div>Ven</div>
          <div>Sab</div>
        </div>
        <div id="calendar-days" class="grid grid-cols-7 gap-1">
          <!-- Calendar cells will be generated here -->
        </div>
      </div>
    </div>

    <script src="src/js/app.js" type="module"></script>
  </body>
</html>
